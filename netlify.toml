[build]
  functions = "netlify/functions"
  publish = "."

[[plugins]]
  package = "@netlify/plugin-functions-install-core"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"

[functions]
  directory = "netlify/functions"

# Oracle — evalúa mercados activos cada 5 minutos
[[scheduled-functions]]
  name = "webhook-oracle"
  schedule = "*/5 * * * *"
